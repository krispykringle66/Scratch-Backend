<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Club Pulse - Scratch Card</title>
<style>
  :root {
    --bg: #0a0e27;
    --panel: #1a1f3a;
    --panel-edge: #2d3a5f;
    --foil-a: #7d5cff;
    --foil-b: #ff1493;
    --win: #2f8f5b;
    --win-glow: #4fce8c;
    --lose: #1a1f3a;
    --gold: #00ffff;
    --text: #e8ecf1;
    --text-dim: #93a0b0;
    --accent-pink: #ff1493;
    --accent-blue: #00bfff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0e27 0%, #1a0f2e 50%, #2d1b4e 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  .logo-header {
    margin-bottom: 20px;
    text-align: center;
  }

  .logo-header img {
    max-width: 120px;
    height: auto;
    filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.4));
  }

  .eyebrow {
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--accent-pink);
    margin-bottom: 6px;
    font-weight: 700;
  }

  h1 {
    font-size: 28px;
    margin: 0 0 4px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .price {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .card-panel {
    background: linear-gradient(160deg, var(--panel), #0f1628);
    border: 2px solid var(--accent-pink);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 0 30px rgba(255, 20, 147, 0.2), 0 20px 60px rgba(0,0,0,0.45);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 96px);
    grid-template-rows: repeat(3, 96px);
    gap: 10px;
  }

  .cell {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: var(--lose);
    touch-action: none;
    border: 1px solid var(--accent-blue);
    box-shadow: inset 0 0 15px rgba(0, 191, 255, 0.1);
    width: 96px;
    height: 96px;
  }

  .cell-result {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 4px;
    background: var(--lose);
    z-index: 1;
  }

  .cell-result.win {
    background: linear-gradient(160deg, #1c4a33, #0f2e1f);
    color: var(--win-glow);
  }

  .cell-result .amount {
    font-size: 16px;
    margin-top: 2px;
  }

  .cell canvas {
    position: absolute;
    inset: 0;
    cursor: crosshair;
    z-index: 10;
  }

  .scratch-debug {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 9px;
    color: rgba(255,255,255,0.55);
    z-index: 20;
    pointer-events: none;
    font-family: monospace;
  }

  .status-row {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .hint {
    color: var(--text-dim);
    font-size: 12px;
  }

  .total {
    font-size: 15px;
    color: var(--text-dim);
  }

  .total strong {
    color: var(--accent-pink);
    font-size: 20px;
    margin-left: 6px;
    text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
  }

  .done-banner {
    display: none;
    margin-top: 6px;
    color: var(--accent-blue);
    font-size: 13px;
    text-align: center;
    text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
  }

  .error-banner {
    display: none;
    color: #ff6b6b;
    font-size: 13px;
    text-align: center;
    margin-top: 20px;
    max-width: 320px;
  }
</style>
</head>
<body>

  <div class="logo-header">
    <img src="/logo.png" alt="Club Pulse">
  </div>

  <div class="eyebrow">Club Pulse</div>
  <h1 id="presetName">Loading…</h1>
  <div class="price" id="priceLine"></div>

  <div class="card-panel">
    <div class="grid" id="grid"></div>
  </div>

  <div class="status-row">
    <div class="hint" id="hintText">Scratch each panel with your mouse or finger.</div>
    <div class="total">Revealed so far:<strong id="totalAmount">0</strong></div>
    <div class="done-banner" id="doneBanner">Card complete — show this screen to the host for payout.</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

<script>
const sessionId = window.location.pathname.split('/').pop();
const gridEl = document.getElementById('grid');
const totalEl = document.getElementById('totalAmount');
const doneBanner = document.getElementById('doneBanner');
const errorBanner = document.getElementById('errorBanner');
const hintText = document.getElementById('hintText');

// Set to false once you've confirmed reveals are firing reliably.
const SHOW_SCRATCH_DEBUG = true;

let revealedResults = new Array(9).fill(null);
let runningTotal = 0;

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
}

function updateTotal() {
  runningTotal = revealedResults.reduce((sum, r) => sum + (r ? r.payout : 0), 0);
  totalEl.textContent = runningTotal;
  if (revealedResults.every(r => r !== null)) {
    doneBanner.style.display = 'block';
    hintText.style.display = 'none';
  }
}

function buildCell(index, existingResult) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const resultLayer = document.createElement('div');
  resultLayer.className = 'cell-result';
  cell.appendChild(resultLayer);

  function paintResult(tier) {
    resultLayer.classList.toggle('win', tier.payout > 0);
    resultLayer.innerHTML = tier.payout > 0
      ? `<span>${tier.name}</span><span class="amount">+${tier.payout}</span>`
      : `<span>${tier.name}</span>`;
  }

  if (existingResult) {
    paintResult(existingResult);
    revealedResults[index] = existingResult;
    return cell;
  }

  // Foil canvas sits on top until scratched away.
  const canvas = document.createElement('canvas');
  canvas.width = 96;
  canvas.height = 96;
  cell.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  let debugLabel = null;
  if (SHOW_SCRATCH_DEBUG) {
    debugLabel = document.createElement('div');
    debugLabel.className = 'scratch-debug';
    debugLabel.textContent = '0%';
    cell.appendChild(debugLabel);
  }

  let revealedAlready = false;
  let scratching = false;
  let lastPos = null;

  // Bigger brush = fewer strokes needed to clear a meaningful fraction
  // of a 96x96 box. 18px radius was too small for how people actually
  // scratch; 26px covers a real swipe in one or two passes.
  const BRUSH_RADIUS = 26;

  // Lowered from 0.3. The sampling in scratchedFraction() is sparse
  // (1 in every 8 pixels), so 30% coverage there means clearing a genuinely
  // large chunk of the box — more than a natural scratch gesture produces.
  const REVEAL_THRESHOLD = 0.15;

  function erase(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, BRUSH_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  function eraseLine(x0, y0, x1, y1) {
    const dist = Math.hypot(x1 - x0, y1 - y0);
    const steps = Math.max(1, Math.ceil(dist / 6));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      erase(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t);
    }
  }

  function scratchedFraction() {
    const data = ctx.getImageData(0, 0, 96, 96).data;
    let cleared = 0;
    for (let i = 3; i < data.length; i += 4 * 8) {
      if (data[i] === 0) cleared++;
    }
    return cleared / (data.length / (4 * 8));
  }

  function redrawFoil() {
    ctx.globalCompositeOperation = 'source-over';
    const foilGradient = ctx.createLinearGradient(0, 0, 96, 96);
    const foilA = getComputedStyle(document.documentElement).getPropertyValue('--foil-a').trim();
    const foilB = getComputedStyle(document.documentElement).getPropertyValue('--foil-b').trim();
    foilGradient.addColorStop(0, foilA);
    foilGradient.addColorStop(1, foilB);
    ctx.fillStyle = foilGradient;
    ctx.fillRect(0, 0, 96, 96);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SCRATCH', 48, 52);
  }

  redrawFoil();

  async function triggerReveal() {
    if (revealedAlready) return;
    revealedAlready = true;

    resultLayer.innerHTML = '<span>Revealing…</span>';

    try {
      const res = await fetch(`/api/sessions/${sessionId}/reveal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cellIndex: index })
      });
      if (!res.ok) throw new Error('reveal failed: ' + res.status);
      const data = await res.json();

      if (!data.tier || typeof data.tier.payout !== 'number' || typeof data.tier.name !== 'string') {
        throw new Error('malformed reveal response: ' + JSON.stringify(data));
      }

      paintResult(data.tier);          // render first
      revealedResults[index] = data.tier;
      updateTotal();
      canvas.remove();                 // only remove once render succeeded
      if (debugLabel) debugLabel.remove();
    } catch (e) {
      console.error('[scratch] reveal failed:', e);
      revealedAlready = false;
      resultLayer.innerHTML = '';
      redrawFoil();                    // canvas is still attached, so this actually works now
      showError('Lost connection while revealing — scratch this box again to retry.');
    }
  }

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (96 / rect.width), y: (clientY - rect.top) * (96 / rect.height) };
  }

  function onMove(e) {
    if (!scratching || revealedAlready) return;
    e.preventDefault();
    const { x, y } = pointerPos(e);
    if (lastPos) {
      eraseLine(lastPos.x, lastPos.y, x, y);
    } else {
      erase(x, y);
    }
    lastPos = { x, y };

    const frac = scratchedFraction();
    if (debugLabel) debugLabel.textContent = Math.round(frac * 100) + '%';

    if (frac > REVEAL_THRESHOLD) {
      scratching = false;
      triggerReveal();
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    scratching = true;
    lastPos = null;
    canvas.setPointerCapture(e.pointerId);
    onMove(e);
  });
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup', (e) => {
    scratching = false;
    lastPos = null;
    canvas.releasePointerCapture(e.pointerId);
  });

  return cell;
}

async function loadSession() {
  try {
    const res = await fetch(`/api/sessions/${sessionId}`);
    if (!res.ok) {
      showError('This scratch card link is invalid or has expired. Ask your host for a new one.');
      return;
    }
    const data = await res.json();
    document.getElementById('presetName').textContent = data.presetName;
    document.getElementById('priceLine').textContent = `Card price: ${data.cardPrice}`;

    gridEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      gridEl.appendChild(buildCell(i, data.revealedResults[i]));
    }
    updateTotal();
  } catch (e) {
    showError('Could not reach the scratch card server.');
  }
}

loadSession();
</script>
</body>
</html>
